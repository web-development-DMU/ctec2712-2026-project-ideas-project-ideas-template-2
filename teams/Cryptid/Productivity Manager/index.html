<!-- These two lines are needed on each page for the navbar to function properly. Reason unknown but the Bootstrap JS doesn't carry over files -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="js/header.js"></script>
<link rel="stylesheet" href="./styles/index.css">
<main>
    <div id="user-details" class="container-fluid d-flex">
        <img id="profile-picture" class="rounded-circle" src="./imgs/profile-placeholder.jpg">
        <p id="username" class="rounded">Username</p>
        <div class=" d-flex rounded-circle h-100 border border-primary">
            <p id="user-level">XP Level</p>
        </div>
    </div>
    <div class="task-table rounded">
        <!-- placeholders for upcoming tasks -->
         <div class="upcoming-task">
            <p class="upcoming-task-name">Name</p>
            <p class="upcoming-task-time">Time</p>
            <p class="upcoming-task-xp">XP</p>
         </div>
         <input type="button" id="view-all-tasks-btn" class="rounded border border-1 border-dark" href="./calendar.html" value="View All Tasks">
         <input type="button" class="add-task-btn rounded-circle" value="Add Task">
    </div>
</main>
