<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>New Transaction - Prototype</title>
  <style>
    body { font-family: Arial; background:#f4f6f8; margin:0; }
    .container { max-width:700px; margin:40px auto; background:#fff; padding:24px; border-radius:10px; }
    label { display:block; margin:12px 0 6px; font-weight:bold; }
    input, select { width:100%; padding:10px; border:1px solid #ccc; border-radius:8px; }
    button { margin-top:16px; padding:10px 14px; border:0; border-radius:8px; cursor:pointer; }
    nav a { color:#3498db; font-weight:bold; text-decoration:none; margin-right:10px; }
    nav a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="container">

    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="transactions.html">Transactions</a>
      <a href="../index.html">Back to Docs</a>
    </nav>

    <h1>Add Transaction (Prototype)</h1>

    <form>
      <label for="amount">Amount (£)</label>
      <input id="amount" name="amount" type="number" required min="0.01" step="0.01" placeholder="e.g. 12.50">

      <label for="type">Type</label>
      <select id="type" name="type" required>
        <option value="">Select…</option>
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>

      <label for="category">Category</label>
      <select id="category" name="category" required>
        <option value="">Select…</option>
        <option>Groceries</option>
        <option>Transport</option>
        <option>Entertainment</option>
        <option>Bills</option>
      </select>

      <label for="date">Date</label>
      <input id="date" name="date" type="date" required>

      <label for="description">Description (optional)</label>
      <input id="description" name="description" type="text" maxlength="200" placeholder="Short note (max 200 chars)">

      <button type="submit">Save</button>
    </form>

    <p><small>
      Client-side validation is shown using HTML attributes (required/min/max/maxlength).
      Server-side validation is still required because users can bypass these checks.
    </small></p>

  </div>
</body>
</html>
