<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Budget Buddy - Dashboard</title>
  <style>
    body { font-family: Arial; background:#f4f6f8; margin:0; }
    .container { max-width:900px; margin:40px auto; background:#fff; padding:30px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
    h1 { text-align:center; color:#2c3e50; }
    .card { background:#ecf0f1; padding:15px; border-radius:8px; margin:10px 0; }
    nav a { margin-right:10px; font-weight:bold; color:#3498db; text-decoration:none; }
  </style>
</head>

<body>
  <div class="container">

    <nav>
      <a href="../index.html">Back to Docs</a>
    </nav>

    <h1>Dashboard (Prototype)</h1>

    <div class="card">
      <h3>Total Income</h3>
      <p>£2,500</p>
    </div>

    <div class="card">
      <h3>Total Expenses</h3>
      <p>£930</p>
    </div>

    <div class="card">
      <h3>Remaining Balance</h3>
      <p>£1,570</p>
    </div>

    <h2>Recent Transactions</h2>
    <ul>
      <li>Groceries - £40</li>
      <li>Transport - £20</li>
      <li>Netflix - £10</li>
    </ul>

  </div>
</body>
</html>
