<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SourceFlow — Admin</title>
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <header>
    <nav aria-label="Application navigation">
      <a href="/app/index.html">Home</a>
      <a href="/app/requests.html">Requests</a>
      <a href="/app/admin.html" aria-current="page">Admin</a>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Admin</h1>
      <p>
        Administrative view: review requests, update status, and add internal notes.
      </p>
    </section>

    <section class="card">
      <div class="actions" style="justify-content: space-between;">
        <h2 class="section-title" style="margin: 0;">Request queue</h2>
        <button type="button" id="refreshAdminBtn">Refresh</button>
      </div>

      <div class="table-wrap">
        <table aria-label="Admin requests table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Customer</th>
              <th>Item</th>
              <th>Status</th>
              <th>Update</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="adminTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
