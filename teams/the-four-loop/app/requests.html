<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SourceFlow — Requests</title>
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <header>
    <nav aria-label="Application navigation">
      <a href="/app/index.html">Home</a>
      <a href="/app/requests.html" aria-current="page">Requests</a>
      <a href="/app/admin.html">Admin</a>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Requests</h1>
      <p>
        Customer view: submit a request and view all submitted requests.
      </p>
    </section>

    <section class="card">
      <h2 class="section-title">Create a new request</h2>

      <form id="requestForm">
        <div class="form-grid">
          <label>
            Customer name
            <input name="customer_name" required />
          </label>

          <label>
            Email
            <input name="customer_email" type="email" />
          </label>

          <label>
            Item name
            <input name="item_name" required />
          </label>

          <label>
            Brand
            <input name="brand" />
          </label>

          <label>
            Budget (£)
            <input name="budget_gbp" type="number" step="0.01" min="0" />
          </label>

          <label>
            Size
            <input name="size" />
          </label>

          <label>
            Colour
            <input name="colour" />
          </label>
        </div>

        <div class="actions">
          <button type="submit">Create request</button>
          <button type="button" id="refreshRequestsBtn">Refresh</button>
          <span id="requestStatus" class="status" role="status" aria-live="polite"></span>
        </div>
      </form>
    </section>

    <section class="card">
      <h2 class="section-title">All requests</h2>

      <div class="table-wrap">
        <table aria-label="Requests table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Customer</th>
              <th>Item</th>
              <th>Brand</th>
              <th>Budget</th>
              <th>Status</th>
              <th>Created</th>
            </tr>
          </thead>
          <tbody id="requestsTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
